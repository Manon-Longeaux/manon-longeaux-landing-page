<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Manon Longeaux</title>
    <meta name="description" content="Contactez Manon Longeaux, étudiante à l'IESEG Lille." />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- HERO -->
    <section class="hero">
      <div class="container">
        <p class="hero-tag">✦ Étudiante à l'IESEG Lille</p>
        <h1 class="hero-title">Bonjour, je suis<br><span>Manon Longeaux</span></h1>
        <p class="hero-subtitle">Tu veux me contacter ? Remplis le formulaire ci-dessous,<br>je te répondrai dès que possible.</p>
        <a href="#contact" class="btn-primary">Me contacter →</a>
      </div>
      <div class="hero-deco"></div>
    </section>

    <!-- FORM SECTION -->
    <section class="form-section" id="contact">
      <div class="container">
        <h2 class="section-title">Envoie-moi un message</h2>
        <p class="section-subtitle">Quelques questions, une réponse rapide 👇</p>
        <div class="typeform-wrapper">
          <iframe
            src="https://form.typeform.com/to/XADjNpWX"
            width="100%"
            height="520px"
            frameborder="0"
            allow="camera; microphone; autoplay; encrypted-media;"
          ></iframe>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <div class="container">
        <p>© 2024 Manon Longeaux</p>
        <a href="https://www.linkedin.com/in/manon-longeaux-388501384/" target="_blank" class="footer-link">LinkedIn ↗</a>
      </div>
    </footer>

  </body>
</html>
